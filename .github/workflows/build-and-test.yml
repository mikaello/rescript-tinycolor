name: Build and test 🔧💉

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "npm"
      - run: npm ci
      - name: Check formatting
        run: npm run check
      - name: Run the tests 👀
        run: npm test
